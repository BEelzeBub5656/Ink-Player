<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ink-Player 语音监听</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#111;color:#0f0;padding:20px;min-height:100vh}
h1{font-size:18px;margin-bottom:16px;color:#0a0}
#log{background:#000;border:1px solid #333;border-radius:6px;padding:12px;height:calc(100vh-120px);overflow-y:auto;font-family:monospace;font-size:14px;line-height:1.6}
.entry{margin-bottom:6px;padding:6px 8px;border-radius:4px;animation:fadeIn .3s}
.entry .time{color:#666;font-size:11px}
.entry .text{color:#0f0;font-weight:600}
.entry .src{color:#ff0;font-size:11px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
#status{font-size:12px;color:#666;margin-bottom:8px}
.connected{color:#0f0}.disconnected{color:#f00}
</style>
</head>
<body>
<h1>Ink-Player 语音识别实时监听</h1>
<div id="status">⏳ 连接中...</div>
<div id="log"></div>
<script>
const status=document.getElementById('status'),log=document.getElementById('log');
const es=new EventSource('/ink-player/events');
es.onopen=()=>{status.textContent='🟢 已连接';status.className='connected'};
es.onerror=()=>{status.textContent='🔴 断开，重连中...';status.className='disconnected'};
es.onmessage=e=>{
  if(!e.data)return;
  try{
    const d=JSON.parse(e.data);
    const div=document.createElement('div');
    div.className='entry';
    div.innerHTML=`<span class="time">${d.at?.slice(11,19)||''}</span>
      <span class="src">[${d.source||''}]</span>
      <span class="text">${d.text||''}</span>`;
    log.prepend(div);
  }catch(_){}
};
</script>
</body>
</html>
