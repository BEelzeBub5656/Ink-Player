# Nginx configuration for Ink-Player firmware hosting
# Place this in /etc/nginx/sites-available/ink-player-firmware
# or include it from your main nginx.conf
#
# Usage:
#   sudo ln -s /etc/nginx/sites-available/ink-player-firmware /etc/nginx/sites-enabled/
#   sudo nginx -s reload

server {
    listen 80;
    server_name _;

    # Firmware OTA static files
    location /firmware/ {
        alias /var/www/firmware/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache";

        # Serve version.json with correct content type
        location ~ \.json$ {
            add_header Content-Type "application/json";
        }

        # Binary firmware files
        location ~ \.bin$ {
            add_header Content-Type "application/octet-stream";
        }
    }
}
